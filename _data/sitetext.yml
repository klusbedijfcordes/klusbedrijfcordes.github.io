  about:
    title: "Klusbedrijf Cordes"
    text: "Wie zijn wij?"
    body: |
      Ons schildersbedrijf wordt gedreven door passie voor het vak en oog voor detail.
      Wij streven ernaar om altijd hoogwaardig en strak schilderwerk af te leveren, waarbij kwaliteit en duurzaamheid voorop staan.
      Elk schilderproject wordt met zorg en precisie uitgevoerd, zodat het eindresultaat niet alleen mooi oogt, maar ook technisch perfect in orde is.

      Wij zijn volledig gericht op zowel binnen- als buitenschilderwerk en beschikken over de kennis en ervaring om uiteenlopende werkzaamheden professioneel uit te voeren.
      Tijdens het werk hanteren wij veilige, nette en georganiseerde werkmethodes, met respect voor uw woning of bedrijfspand.

      Afspraak is bij ons afspraak: het werk wordt altijd volgens planning afgerond.
      Wij zorgen voor een duidelijke communicatie en een nette, eerlijke afhandeling van betalingen, zodat u met een goed gevoel kunt terugkijken op de samenwerking.
    section: about

